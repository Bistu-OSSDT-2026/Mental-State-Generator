<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>精神状态生成器 · BISTU</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-main: #ffffff;
      --bg-card: #f8f9fa;
      --text-color: #222222;
      --border-color: #e5e7eb;
    }
    .dark {
      --bg-main: #1a1a22;
      --bg-card: #2c2c3a;
      --text-color: #f1f1f1;
      --border-color: #444455;
    }
    body {
      background-color: var(--bg-main);
      color: var(--text-color);
      transition: background-color 0.25s ease, color 0.2s;
    }
    .card-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      transition: background 0.2s, border 0.2s;
    }
    .bistu-watermark {
      position: fixed;
      bottom: 16px;
      right: 20px;
      font-size: 20px;
      letter-spacing: 4px;
      color: rgba(120, 120, 120, 0.25);
      font-weight: bold;
      pointer-events: none;
      user-select: none;
      z-index: 9999;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .canvas-container {
      position: relative;
    }
    @media (max-width: 640px) {
      .bistu-watermark {
        font-size: 14px;
        bottom: 8px;
        right: 12px;
      }
    }
    .sticker-dot {
      transition: 0.1s ease;
      border: 2px solid transparent;
    }
    .sticker-dot:hover {
      border-color: #6b8cff;
      transform: scale(0.96);
    }
    .sticker-dot.active {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px #bfdbfe;
    }
    .cate-item.active {
      background-color: #dbeafe;
      color: #1e3a8a;
      font-weight: 500;
    }
    .dark .cate-item.active {
      background-color: #334155;
      color: #b9d0ff;
    }
    #collectList::-webkit-scrollbar {
      width: 4px;
    }
    #collectList::-webkit-scrollbar-thumb {
      background: #b0b0c0;
      border-radius: 8px;
    }
    textarea, select, input {
      background-color: var(--bg-card);
      color: var(--text-color);
      border-color: var(--border-color);
    }
    .dark textarea, .dark select, .dark input {
      background-color: #2a2a38;
      color: #f0f0f0;
    }
    .emoji-btn {
      transition: all 0.15s ease;
    }
    .emoji-btn:hover {
      transform: scale(1.1);
    }
    .emoji-btn.active {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }
  </style>
</head>
<body class="min-h-screen p-3 md:p-5 antialiased">

  <div class="bistu-watermark">BISTU</div>

  <header class="flex flex-wrap justify-between items-center mb-5 card-box rounded-xl p-3 md:p-4 gap-2">
    <h1 class="text-xl md:text-2xl font-bold tracking-tight">🧠 精神状态生成器</h1>
    <div class="flex flex-wrap gap-2">
      <button id="themeBtn" class="px-3 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 transition text-sm md:text-base">🌓 切换暗黑</button>
      <button id="exportImgBtn" class="px-3 py-2 rounded-lg bg-blue-500 hover:bg-blue-600 text-white transition text-sm md:text-base">⬇️ 导出PNG</button>
    </div>
  </header>

  <main class="grid grid-cols-1 md:grid-cols-12 gap-4">
    <section id="textPanel" class="md:col-span-3 card-box rounded-xl p-4 h-fit">
      <h2 class="text-lg font-semibold mb-3">📝 文案库</h2>
      <div id="cateBox" class="flex flex-wrap gap-2 mb-4">
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="earlyMorning">早八发疯</button>
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="examSeason">期末破防</button>
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="food">干饭日常</button>
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="campusEmo">校园emo</button>
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="csMemes">计算机梗</button>
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="love">恋爱心语</button>
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="gentle">治愈温柔</button>
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="independent">清醒独立</button>
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="sad">emo伤感</button>
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="inspire">励志向上</button>
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="literary">文艺短句</button>
        <button class="cate-item px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="funny">搞怪沙雕</button>
      </div>
      <button id="randomTextBtn" class="w-full py-2 bg-green-400 hover:bg-green-500 rounded-lg mb-3 transition text-white font-medium">🎲 随机文案</button>
      <textarea id="textInput" rows="3" class="w-full p-2 rounded-lg border resize-none outline-none transition mb-2" placeholder="自定义输入文案...">今天也是元气满满的一天呢</textarea>
      <div class="flex gap-2 mb-3">
        <button id="alignLeft" class="flex-1 py-1 rounded bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 transition text-sm">⬅️ 左</button>
        <button id="alignCenter" class="flex-1 py-1 rounded bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 transition text-sm">⬛ 居中</button>
        <button id="alignRight" class="flex-1 py-1 rounded bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 transition text-sm">➡️ 右</button>
      </div>
      <button id="collectBtn" class="w-full py-1.5 bg-indigo-200 hover:bg-indigo-300 rounded-lg transition text-sm mb-3">⭐ 收藏当前文案</button>
      <hr class="my-3 border-[var(--border-color)]">
      <h3 class="font-medium mb-2 text-sm">📋 收藏文案</h3>
      <div id="collectList" class="space-y-2 max-h-40 overflow-y-auto text-sm">
        <p class="text-gray-400 text-center text-xs">暂无收藏</p>
      </div>
    </section>

    <section class="md:col-span-6 flex flex-col items-center">
      <div class="canvas-container card-box p-3 rounded-xl w-full">
        <canvas id="mainCanvas" width="600" height="600" class="max-w-full border rounded shadow-sm" style="aspect-ratio: 1/1; width: 100%; height: auto;"></canvas>
      </div>
      <p class="mt-3 text-sm text-gray-500 dark:text-gray-400">✨ 实时预览 · 自带 BISTU 水印</p>
    </section>

    <section id="stylePanel" class="md:col-span-3 card-box rounded-xl p-4 h-fit space-y-4">
      <h2 class="text-lg font-semibold mb-1">🎨 画布调节</h2>
      <div>
        <p class="text-sm mb-1">📐 画布尺寸</p>
        <select id="sizeSelect" class="w-full p-2 rounded border outline-none transition">
          <option value="600,600">方形 600×600</option>
          <option value="600,900">竖图 600×900</option>
        </select>
      </div>
      <div>
        <p class="text-sm mb-1">🎨 纯色背景</p>
        <input type="color" id="bgColorInput" value="#ffffff" class="w-full h-10 cursor-pointer rounded border">
      </div>
      <div>
        <p class="text-sm mb-1">🖼️ 表情包底图</p>
        <div id="imgList" class="grid grid-cols-4 gap-2">
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="😆">😆</div>
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="🤯">🤯</div>
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="🥳">🥳</div>
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="😭">😭</div>
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="😤">😤</div>
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="😴">😴</div>
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="🐱">🐱</div>
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="🐶">🐶</div>
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="🐸">🐸</div>
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="🤖">🤖</div>
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="👻">👻</div>
          <div class="emoji-btn w-full aspect-square bg-gray-200 dark:bg-gray-700 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-2xl" data-emoji="🙈">🙈</div>
        </div>
      </div>
      <hr class="border-[var(--border-color)]">
      <div>
        <p class="text-sm mb-1">🔤 字号</p>
        <input type="range" id="fontSize" min="12" max="80" value="36" class="w-full">
      </div>
      <div>
        <p class="text-sm mb-1">✏️ 文字颜色</p>
        <input type="color" id="fontColor" value="#000000" class="w-full h-10 cursor-pointer rounded border">
      </div>
      <div>
        <p class="text-sm mb-1">🖊️ 描边粗细</p>
        <input type="range" id="strokeWidth" min="0" max="8" value="3" class="w-full">
      </div>
      <hr class="border-[var(--border-color)]">
      <h3 class="font-medium">⭐ 装饰贴纸</h3>
      <div id="stickerBox" class="grid grid-cols-4 gap-2">
        <div class="sticker-dot w-full aspect-square bg-pink-200 dark:bg-pink-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl" data-sticker="❤️">❤️</div>
        <div class="sticker-dot w-full aspect-square bg-yellow-200 dark:bg-yellow-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl" data-sticker="⭐">⭐</div>
        <div class="sticker-dot w-full aspect-square bg-blue-200 dark:bg-blue-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl" data-sticker="🌈">🌈</div>
        <div class="sticker-dot w-full aspect-square bg-green-200 dark:bg-green-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl" data-sticker="☀️">☀️</div>
        <div class="sticker-dot w-full aspect-square bg-purple-200 dark:bg-purple-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl" data-sticker="❓">❓</div>
        <div class="sticker-dot w-full aspect-square bg-orange-200 dark:bg-orange-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl" data-sticker="💦">💦</div>
        <div class="sticker-dot w-full aspect-square bg-red-200 dark:bg-red-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl" data-sticker="🔥">🔥</div>
        <div class="sticker-dot w-full aspect-square bg-cyan-200 dark:bg-cyan-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl" data-sticker="✨">✨</div>
      </div>
      <hr class="border-[var(--border-color)]">
      <div class="space-y-2">
        <button id="copyTextBtn" class="w-full py-2 bg-amber-400 hover:bg-amber-500 rounded-lg transition text-white font-medium">📋 复制文案</button>
        <button id="undoBtn" class="w-full py-2 bg-gray-400 hover:bg-gray-500 text-white rounded-lg transition">↩️ 撤销修改</button>
        <button id="resetCanvasBtn" class="w-full py-2 bg-red-400 hover:bg-red-500 text-white rounded-lg transition">🔄 重置画布</button>
      </div>
    </section>
  </main>

  <script type="module">
    import textData from './Js/textData.js';

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const textInput = document.getElementById('textInput');
    const fontSizeRange = document.getElementById('fontSize');
    const fontColorInput = document.getElementById('fontColor');
    const bgColorInput = document.getElementById('bgColorInput');
    const strokeWidthRange = document.getElementById('strokeWidth');
    const sizeSelect = document.getElementById('sizeSelect');
    const themeBtn = document.getElementById('themeBtn');
    const exportBtn = document.getElementById('exportImgBtn');
    const randomTextBtn = document.getElementById('randomTextBtn');
    const alignLeft = document.getElementById('alignLeft');
    const alignCenter = document.getElementById('alignCenter');
    const alignRight = document.getElementById('alignRight');
    const collectList = document.getElementById('collectList');
    const collectBtn = document.getElementById('collectBtn');
    const copyTextBtn = document.getElementById('copyTextBtn');
    const undoBtn = document.getElementById('undoBtn');
    const resetCanvasBtn = document.getElementById('resetCanvasBtn');

    let currentSticker = null;
    let currentEmoji = '😆';
    let historyStack = [];
    const MAX_HISTORY = 8;
    let collected = [];

    function loadCollected() {
      try {
        const saved = localStorage.getItem('favorite_texts');
        if (saved) {
          collected = JSON.parse(saved);
        }
      } catch (e) {
        console.error('加载收藏失败:', e);
        collected = [];
      }
      updateCollectList();
    }

    function saveCollected() {
      try {
        localStorage.setItem('favorite_texts', JSON.stringify(collected));
      } catch (e) {
        console.error('保存收藏失败:', e);
      }
    }

    function renderCanvas() {
      const w = canvas.width;
      const h = canvas.height;
      ctx.fillStyle = bgColorInput.value;
      ctx.fillRect(0, 0, w, h);

      ctx.font = '120px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#222';
      ctx.fillText(currentEmoji, w/2, h/2 - 40);

      if (currentSticker) {
        ctx.font = '54px "Segoe UI Emoji", sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillStyle = '#333';
        ctx.fillText(currentSticker, w-20, 16);
      }

      const text = textInput.value.trim() || ' ';
      const fontSize = parseInt(fontSizeRange.value, 10);
      const fontColor = fontColorInput.value;
      const strokeWidth = parseInt(strokeWidthRange.value, 10);

      ctx.font = `${fontSize}px "PingFang SC", "Microsoft YaHei", system-ui, sans-serif`;
      const align = window._textAlign || 'center';
      ctx.textAlign = align;
      ctx.textBaseline = 'top';

      const lines = text.split('\n');
      const lineHeight = fontSize * 1.4;
      let startY = h - 40 - (lines.length-1) * lineHeight/2;
      let xPos = (align === 'left') ? 30 : (align === 'right') ? w - 30 : w/2;

      lines.forEach((line, idx) => {
        const y = startY + idx * lineHeight;
        if (strokeWidth > 0) {
          ctx.lineWidth = strokeWidth;
          ctx.strokeStyle = '#ffffff';
          ctx.strokeText(line, xPos, y);
        }
        ctx.fillStyle = fontColor;
        ctx.fillText(line, xPos, y);
      });

      ctx.font = 'bold 18px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'bottom';
      ctx.fillStyle = 'rgba(120, 120, 120, 0.25)';
      ctx.fillText('BISTU', w-12, h-10);

      saveHistory();
    }

    function saveHistory() {
      const dataUrl = canvas.toDataURL('image/png');
      historyStack.push(dataUrl);
      if (historyStack.length > MAX_HISTORY) historyStack.shift();
    }

    function undoLast() {
      if (historyStack.length <= 1) return;
      historyStack.pop();
      const prev = historyStack[historyStack.length-1];
      if (!prev) return;
      const img = new Image();
      img.onload = function() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
      };
      img.src = prev;
    }

    function resetCanvas() {
      historyStack = [];
      bgColorInput.value = '#ffffff';
      fontColorInput.value = '#000000';
      fontSizeRange.value = '36';
      strokeWidthRange.value = '3';
      textInput.value = '今天也是元气满满的一天呢';
      currentEmoji = '😆';
      currentSticker = null;
      window._textAlign = 'center';
      document.querySelectorAll('.emoji-btn').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.sticker-dot').forEach(el => el.classList.remove('active'));
      renderCanvas();
    }

    function updateCanvasSize() {
      const val = sizeSelect.value;
      const [w, h] = val.split(',').map(Number);
      canvas.width = w;
      canvas.height = h;
      renderCanvas();
    }

    textInput.addEventListener('input', renderCanvas);
    fontSizeRange.addEventListener('input', renderCanvas);
    fontColorInput.addEventListener('input', renderCanvas);
    bgColorInput.addEventListener('input', renderCanvas);
    strokeWidthRange.addEventListener('input', renderCanvas);
    sizeSelect.addEventListener('change', updateCanvasSize);

    function setAlign(align) {
      window._textAlign = align;
      renderCanvas();
    }
    alignLeft.addEventListener('click', ()=> setAlign('left'));
    alignCenter.addEventListener('click', ()=> setAlign('center'));
    alignRight.addEventListener('click', ()=> setAlign('right'));

    document.querySelectorAll('#imgList div').forEach(el => {
      el.addEventListener('click', function() {
        const emoji = this.dataset.emoji;
        if (emoji) {
          currentEmoji = emoji;
          document.querySelectorAll('.emoji-btn').forEach(e => e.classList.remove('active'));
          this.classList.add('active');
          renderCanvas();
        }
      });
    });

    document.querySelectorAll('#stickerBox div').forEach(el => {
      el.addEventListener('click', function() {
        const sticker = this.dataset.sticker;
        if (sticker) {
          if (currentSticker === sticker) {
            currentSticker = null;
            this.classList.remove('active');
          } else {
            currentSticker = sticker;
            document.querySelectorAll('.sticker-dot').forEach(d => d.classList.remove('active'));
            this.classList.add('active');
          }
          renderCanvas();
        }
      });
    });

    randomTextBtn.addEventListener('click', function() {
      const keys = Object.keys(textData);
      const randCate = keys[Math.floor(Math.random() * keys.length)];
      const arr = textData[randCate];
      const msg = arr[Math.floor(Math.random() * arr.length)];
      textInput.value = msg;
      renderCanvas();
    });

    document.querySelectorAll('.cate-item').forEach(btn => {
      btn.addEventListener('click', function() {
        const cate = this.dataset.cate;
        const list = textData[cate] || ['默认文案'];
        const msg = list[Math.floor(Math.random() * list.length)];
        textInput.value = msg;
        renderCanvas();
        document.querySelectorAll('.cate-item').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
      });
    });

    collectList.addEventListener('click', function(e) {
      const target = e.target;
      if (target.tagName === 'P' && target.dataset.text) {
        const txt = target.dataset.text;
        textInput.value = txt;
        renderCanvas();
      }
    });

    collectBtn.addEventListener('click', function() {
      const txt = textInput.value.trim();
      if (!txt) return;
      if (!collected.includes(txt)) {
        collected.push(txt);
        saveCollected();
        updateCollectList();
      } else {
        alert('已收藏过该文案');
      }
    });

    function updateCollectList() {
      collectList.innerHTML = '';
      if (collected.length === 0) {
        collectList.innerHTML = '<p class="text-gray-400 text-center text-xs">暂无收藏</p>';
        return;
      }
      collected.slice().reverse().forEach(t => {
        const p = document.createElement('p');
        p.className = 'text-sm p-1.5 bg-gray-100 dark:bg-gray-700 rounded cursor-pointer hover:bg-gray-200 transition truncate';
        p.dataset.text = t;
        p.innerText = t;
        collectList.appendChild(p);
      });
    }

    copyTextBtn.addEventListener('click', function() {
      const txt = textInput.value;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(txt).then(() => {
          alert('文案已复制到剪贴板');
        }).catch(() => {});
      } else {
        const ta = document.createElement('textarea');
        ta.value = txt;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
        alert('文案已复制');
      }
    });

    undoBtn.addEventListener('click', undoLast);
    resetCanvasBtn.addEventListener('click', resetCanvas);

    exportBtn.addEventListener('click', function() {
      const link = document.createElement('a');
      link.download = `精神状态_${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    themeBtn.addEventListener('click', function() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      themeBtn.innerText = isDark ? '☀️ 切换亮色' : '🌓 切换暗黑';
    });

    window._textAlign = 'center';
    updateCanvasSize();
    loadCollected();
    console.log('🧠 精神状态生成器已启动 — BISTU 水印内置');
  </script>
</body>
</html>
