<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>精神状态生成器 · UI 演示</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 纯UI演示：保留全部样式，所有按键只做视觉反馈，无实际功能 */
    :root {
      --bg-main: #ffffff;
      --bg-card: #f8f9fa;
      --text-color: #222222;
      --border-color: #e5e7eb;
    }
    .dark {
      --bg-main: #1a1a22;
      --bg-card: #2c2c3a;
      --text-color: #f1f1f1;
      --border-color: #444455;
    }
    body {
      background-color: var(--bg-main);
      color: var(--text-color);
      transition: background-color 0.25s ease, color 0.2s;
    }
    .card-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      transition: background 0.2s, border 0.2s;
    }
    .bistu-watermark {
      position: fixed;
      bottom: 16px;
      right: 20px;
      font-size: 20px;
      letter-spacing: 4px;
      color: rgba(120, 120, 120, 0.25);
      font-weight: bold;
      pointer-events: none;
      user-select: none;
      z-index: 9999;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .canvas-container {
      position: relative;
    }
    @media (max-width: 640px) {
      .bistu-watermark { font-size: 14px; bottom: 8px; right: 12px; }
    }
    .sticker-dot {
      transition: 0.1s ease;
      border: 2px solid transparent;
    }
    .sticker-dot:hover {
      border-color: #6b8cff;
      transform: scale(0.96);
    }
    .sticker-dot.active {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px #bfdbfe;
    }
    .cate-item.active {
      background-color: #dbeafe;
      color: #1e3a8a;
      font-weight: 500;
    }
    .dark .cate-item.active {
      background-color: #334155;
      color: #b9d0ff;
    }
    #collectList::-webkit-scrollbar { width: 4px; }
    #collectList::-webkit-scrollbar-thumb { background: #b0b0c0; border-radius: 8px; }
    textarea, select, input {
      background-color: var(--bg-card);
      color: var(--text-color);
      border-color: var(--border-color);
    }
    .dark textarea, .dark select, .dark input {
      background-color: #2a2a38;
      color: #f0f0f0;
    }
    /* 纯UI演示：按键点击只展示反馈，不执行逻辑 */
    .ui-only-btn {
      cursor: pointer;
      transition: all 0.1s ease;
    }
    .ui-only-btn:active {
      transform: scale(0.94);
      opacity: 0.7;
    }
    /* 模拟画布固定展示 */
    #mainCanvas {
      background: #f0f2f5;
      background-image: radial-gradient(circle at 20% 30%, #e0e4ea 1px, transparent 1px);
      background-size: 20px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #666;
    }
    .dark #mainCanvas {
      background: #2a2a36;
      background-image: radial-gradient(circle at 20% 30%, #3a3a4a 1px, transparent 1px);
      background-size: 20px 20px;
    }
  </style>
</head>
<body class="min-h-screen p-3 md:p-5 antialiased">

  <!-- 固定水印 (符合要求) -->
  <div class="bistu-watermark">BISTU</div>

  <!-- 顶部导航 -->
  <header class="flex flex-wrap justify-between items-center mb-5 card-box rounded-xl p-3 md:p-4 gap-2">
    <h1 class="text-xl md:text-2xl font-bold tracking-tight">🧠 精神状态生成器 · UI</h1>
    <div class="flex flex-wrap gap-2">
      <button id="themeBtn" class="ui-only-btn px-3 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 transition text-sm md:text-base">🌓 切换暗黑</button>
      <button id="exportImgBtn" class="ui-only-btn px-3 py-2 rounded-lg bg-blue-500 hover:bg-blue-600 text-white transition text-sm md:text-base">⬇️ 导出PNG</button>
    </div>
  </header>

  <!-- 主布局：左 3 / 中 6 / 右 3 -->
  <main class="grid grid-cols-1 md:grid-cols-12 gap-4">
    <!-- 左侧：文案库 (UI only) -->
    <section id="textPanel" class="md:col-span-3 card-box rounded-xl p-4 h-fit">
      <h2 class="text-lg font-semibold mb-3">📝 文案库</h2>
      <div id="cateBox" class="flex flex-wrap gap-2 mb-4">
        <button class="cate-item ui-only-btn px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="早八发疯">早八发疯</button>
        <button class="cate-item ui-only-btn px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="干饭日常">干饭日常</button>
        <button class="cate-item ui-only-btn px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="摸鱼哲学">摸鱼哲学</button>
        <button class="cate-item ui-only-btn px-3 py-1 rounded bg-gray-100 dark:bg-gray-700 text-sm hover:bg-gray-200 transition" data-cate="温柔短句">温柔短句</button>
      </div>
      <button id="randomTextBtn" class="ui-only-btn w-full py-2 bg-green-400 hover:bg-green-500 rounded-lg mb-3 transition text-white font-medium">🎲 随机文案</button>
      <textarea id="textInput" rows="3" class="w-full p-2 rounded-lg border resize-none outline-none transition mb-2" placeholder="自定义输入文案..." readonly>今天也是元气满满的一天呢</textarea>
      <div class="flex gap-2 mb-3">
        <button id="alignLeft" class="ui-only-btn flex-1 py-1 rounded bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 transition text-sm">⬅️ 左</button>
        <button id="alignCenter" class="ui-only-btn flex-1 py-1 rounded bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 transition text-sm">⬛ 居中</button>
        <button id="alignRight" class="ui-only-btn flex-1 py-1 rounded bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 transition text-sm">➡️ 右</button>
      </div>
      <hr class="my-3 border-[var(--border-color)]">
      <h3 class="font-medium mb-2 text-sm">📋 收藏文案</h3>
      <div id="collectList" class="space-y-2 max-h-40 overflow-y-auto text-sm">
        <p class="text-gray-400 text-center text-xs">点击下方文案即可收藏 (演示)</p>
        <p class="text-sm p-1.5 bg-gray-100 dark:bg-gray-700 rounded cursor-default truncate">✨ 早八人，早八魂</p>
        <p class="text-sm p-1.5 bg-gray-100 dark:bg-gray-700 rounded cursor-default truncate">☕ 咖啡续命中…</p>
      </div>
      <!-- 收藏按钮 (UI) -->
      <button class="ui-only-btn w-full py-1.5 mt-2 bg-indigo-200 hover:bg-indigo-300 rounded-lg transition text-sm">⭐ 收藏当前文案</button>
    </section>

    <!-- 中间：画布预览 (固定展示) -->
    <section class="md:col-span-6 flex flex-col items-center">
      <div class="canvas-container card-box p-3 rounded-xl w-full">
        <canvas id="mainCanvas" width="600" height="600" class="max-w-full border rounded shadow-sm" style="aspect-ratio: 1/1; width: 100%; height: auto; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #555;">
          🧠 精神状态预览区
        </canvas>
      </div>
      <p class="mt-3 text-sm text-gray-500 dark:text-gray-400">✨ 实时预览 · 自带 BISTU 水印 (UI演示)</p>
    </section>

    <!-- 右侧：样式面板 (UI only) -->
    <section id="stylePanel" class="md:col-span-3 card-box rounded-xl p-4 h-fit space-y-4">
      <h2 class="text-lg font-semibold mb-1">🎨 画布调节</h2>
      <div>
        <p class="text-sm mb-1">📐 画布尺寸</p>
        <select id="sizeSelect" class="w-full p-2 rounded border outline-none transition">
          <option value="600,600">方形 600×600</option>
          <option value="600,900">竖图 600×900</option>
        </select>
      </div>
      <div>
        <p class="text-sm mb-1">🎨 纯色背景</p>
        <input type="color" id="bgColorInput" value="#ffffff" class="w-full h-10 cursor-pointer rounded border">
      </div>
      <div>
        <p class="text-sm mb-1">🖼️ 表情包 (点击替换)</p>
        <div id="imgList" class="grid grid-cols-3 gap-2">
          <div class="ui-only-btn w-full aspect-square bg-gray-300 dark:bg-gray-600 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-3xl">😆</div>
          <div class="ui-only-btn w-full aspect-square bg-gray-300 dark:bg-gray-600 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-3xl">🤯</div>
          <div class="ui-only-btn w-full aspect-square bg-gray-300 dark:bg-gray-600 rounded cursor-pointer hover:opacity-80 transition flex items-center justify-center text-3xl">🥳</div>
        </div>
      </div>
      <hr class="border-[var(--border-color)]">
      <div>
        <p class="text-sm mb-1">🔤 字号</p>
        <input type="range" id="fontSize" min="12" max="80" value="36" class="w-full">
      </div>
      <div>
        <p class="text-sm mb-1">✏️ 文字颜色</p>
        <input type="color" id="fontColor" value="#000000" class="w-full h-10 cursor-pointer rounded border">
      </div>
      <div>
        <p class="text-sm mb-1">🖊️ 描边粗细</p>
        <input type="range" id="strokeWidth" min="0" max="8" value="3" class="w-full">
      </div>
      <hr class="border-[var(--border-color)]">
      <h3 class="font-medium">⭐ 装饰贴纸</h3>
      <div id="stickerBox" class="grid grid-cols-4 gap-2">
        <div class="sticker-dot ui-only-btn w-full aspect-square bg-pink-200 dark:bg-pink-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl">❤️</div>
        <div class="sticker-dot ui-only-btn w-full aspect-square bg-yellow-200 dark:bg-yellow-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl">⭐</div>
        <div class="sticker-dot ui-only-btn w-full aspect-square bg-blue-200 dark:bg-blue-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl">🌈</div>
        <div class="sticker-dot ui-only-btn w-full aspect-square bg-green-200 dark:bg-green-800 rounded cursor-pointer hover:opacity-80 flex items-center justify-center text-xl">☀️</div>
      </div>
      <hr class="border-[var(--border-color)]">
      <div class="space-y-2">
        <button id="copyTextBtn" class="ui-only-btn w-full py-2 bg-amber-400 hover:bg-amber-500 rounded-lg transition text-white font-medium">📋 复制文案</button>
        <button id="undoBtn" class="ui-only-btn w-full py-2 bg-gray-400 hover:bg-gray-500 text-white rounded-lg transition">↩️ 撤销修改</button>
        <button id="resetCanvasBtn" class="ui-only-btn w-full py-2 bg-red-400 hover:bg-red-500 text-white rounded-lg transition">🔄 重置画布</button>
      </div>
    </section>
  </main>

  <script>
    (function(){
      // ---------- 纯UI演示：所有按键只做视觉反馈，无实际功能 ----------
      console.log('🧠 精神状态生成器 · UI演示模式 (无功能)');

      // 暗色模式切换 (唯一保留的实用功能，方便查看暗色UI)
      const themeBtn = document.getElementById('themeBtn');
      if (themeBtn) {
        themeBtn.addEventListener('click', function() {
          document.body.classList.toggle('dark');
          const isDark = document.body.classList.contains('dark');
          this.innerText = isDark ? '☀️ 切换亮色' : '🌓 切换暗黑';
        });
      }

      // 为所有 .ui-only-btn 添加点击反馈 (视觉反馈，不执行逻辑)
      document.querySelectorAll('.ui-only-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          // 简单震动反馈 (仅UI演示)
          this.style.transform = 'scale(0.94)';
          setTimeout(() => { this.style.transform = ''; }, 120);
          // 控制台提示（不干扰界面）
          console.log(`[UI演示] 点击了: ${this.innerText.trim() || '按钮'}`);
          // 阻止任何默认行为或冒泡 (保持纯UI)
          e.preventDefault();
        });
      });

      // 让分类按钮有高亮切换效果 (纯UI)
      document.querySelectorAll('.cate-item').forEach(btn => {
        btn.addEventListener('click', function(e) {
          document.querySelectorAll('.cate-item').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          e.preventDefault();
        });
      });

      // 贴纸模拟选中 (纯UI)
      document.querySelectorAll('#stickerBox .sticker-dot').forEach(el => {
        el.addEventListener('click', function(e) {
          document.querySelectorAll('#stickerBox .sticker-dot').forEach(d => d.classList.remove('active'));
          this.classList.toggle('active');
          e.preventDefault();
        });
      });

      // 表情包模拟高亮 (纯UI)
      document.querySelectorAll('#imgList div').forEach(el => {
        el.addEventListener('click', function(e) {
          document.querySelectorAll('#imgList div').forEach(d => d.style.outline = 'none');
          this.style.outline = '2px solid #2563eb';
          this.style.outlineOffset = '2px';
          e.preventDefault();
        });
      });

      // 收藏列表点击“演示”提示
      const collectItems = document.querySelectorAll('#collectList p');
      collectItems.forEach(p => {
        p.addEventListener('click', function(e) {
          alert('[UI演示] 点击收藏文案: ' + this.innerText);
          e.preventDefault();
        });
      });

      // 禁用所有表单输入的实际修改 (除了暗色模式)
      const formInputs = document.querySelectorAll('input, select, textarea');
      formInputs.forEach(input => {
        if (input.id === 'themeBtn') return;
        input.addEventListener('change', function(e) {
          // 阻止实际修改，但保留UI变化感（比如颜色选择器会变，但不会影响画布）
          console.log('[UI演示] 表单值变化: ', this.value);
          e.preventDefault();
        });
        // 对于range和color，我们允许视觉变化但无实际效果
        if (input.type === 'range' || input.type === 'color') {
          input.addEventListener('input', function(e) {
            // 仅仅在控制台显示，无实际功能
            console.log(`[UI演示] ${this.id} 值: ${this.value}`);
          });
        }
      });

      // 对文本域禁止编辑 (保留样式)
      const textarea = document.getElementById('textInput');
      if (textarea) {
        textarea.addEventListener('focus', function(e) {
          this.blur(); // 禁止聚焦编辑，保持演示
          alert('[UI演示] 文案输入框为只读演示');
        });
      }

      // 导出按钮/其他按钮只演示
      const exportBtn = document.getElementById('exportImgBtn');
      if (exportBtn) {
        exportBtn.addEventListener('click', function(e) {
          alert('[UI演示] 导出PNG功能已禁用，仅展示UI');
          e.preventDefault();
        });
      }

      // 重置/撤销等按钮提示
      document.getElementById('undoBtn')?.addEventListener('click', function(e) {
        alert('[UI演示] 撤销功能已禁用，仅展示UI');
        e.preventDefault();
      });
      document.getElementById('resetCanvasBtn')?.addEventListener('click', function(e) {
        alert('[UI演示] 重置画布功能已禁用，仅展示UI');
        e.preventDefault();
      });
      document.getElementById('copyTextBtn')?.addEventListener('click', function(e) {
        alert('[UI演示] 复制文案功能已禁用，仅展示UI');
        e.preventDefault();
      });
      document.getElementById('randomTextBtn')?.addEventListener('click', function(e) {
        alert('[UI演示] 随机文案功能已禁用，仅展示UI');
        e.preventDefault();
      });

      // 尺寸选择、颜色等只演示
      document.getElementById('sizeSelect')?.addEventListener('change', function(e) {
        alert('[UI演示] 画布尺寸切换已禁用，仅展示UI');
        e.preventDefault();
      });

      console.log('✅ UI演示模式已启动 — 所有按键仅展示，无实际功能');
    })();
  </script>
</body>
</html>
